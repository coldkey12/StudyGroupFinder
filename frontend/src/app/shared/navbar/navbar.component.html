<nav class="navbar">
  <div class="logo">
    <a routerLink="/dashboard">StudyGroupFinder</a>
  </div>

  <div class="nav-links">
    @if (isAuthenticated) {
      <a routerLink="/dashboard">Dashboard</a>
      <span class="username">{{ username }}</span>
      <button (click)="logout()">Logout</button>
    } @else {
      <a routerLink="/login">Login</a>
      <a routerLink="/register">Register</a>
    }
  </div>
</nav>
