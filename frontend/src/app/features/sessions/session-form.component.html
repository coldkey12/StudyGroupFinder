<div class="form-page">
  <h1>{{ isEdit ? 'Edit Session' : 'Create Session' }}</h1>

  <div *ngIf="error" class="error">{{ error }}</div>

  <form (ngSubmit)="submit()" #f="ngForm">
    <div class="field">
      <label>Title</label>
      <input type="text" [(ngModel)]="form.title" name="title" required minlength="3" />
    </div>

    <div class="field">
      <label>Description</label>
      <textarea [(ngModel)]="form.description" name="description" rows="3"></textarea>
    </div>

    <div class="field">
      <label>Course</label>
      <select [(ngModel)]="form.course" name="course" required>
        <option value="">-- Select course --</option>
        <option *ngFor="let c of courses" [value]="c.id">{{ c.name }} ({{ c.code }})</option>
      </select>
    </div>

    <div class="field">
      <label>Date</label>
      <input type="date" [(ngModel)]="form.date" name="date" required />
    </div>

    <div class="row">
      <div class="field">
        <label>Start time</label>
        <input type="time" [(ngModel)]="form.start_time" name="start_time" required />
      </div>
      <div class="field">
        <label>End time</label>
        <input type="time" [(ngModel)]="form.end_time" name="end_time" required />
      </div>
    </div>

    <div class="field">
      <label>Location</label>
      <input type="text" [(ngModel)]="form.location" name="location" required />
    </div>

    <div class="field">
      <label>Max participants</label>
      <input type="number" [(ngModel)]="form.max_participants" name="max_participants" min="1" max="100" required />
    </div>

    <div class="actions">
      <button type="submit" class="btn-primary" [disabled]="submitting || f.invalid">
        {{ submitting ? 'Saving...' : (isEdit ? 'Save changes' : 'Create session') }}
      </button>
      <a routerLink="/sessions" class="btn-secondary">Cancel</a>
    </div>
  </form>
</div>
