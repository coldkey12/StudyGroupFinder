<app-navbar></app-navbar>

<div class="sessions-page">
  <div class="page-header">
    <h1>Study Sessions</h1>
    <a routerLink="/sessions/new" class="btn-primary">+ New Session</a>
  </div>

  <div *ngIf="loading" class="loading">Loading...</div>
  <div *ngIf="error" class="error">{{ error }}</div>

  <div *ngIf="!loading && sessions.length === 0" class="empty">
    No sessions available yet.
  </div>

  <div class="sessions-grid" *ngIf="!loading && sessions.length > 0">
    <div class="session-card" *ngFor="let s of sessions">
      <div class="card-header">
        <h3>
          <a [routerLink]="['/sessions', s.id]">{{ s.title }}</a>
        </h3>
        <span class="course-badge">{{ s.course_name }}</span>
      </div>
      <div class="card-body">
        <p class="meta">{{ s.date }} &bull; {{ s.start_time }} – {{ s.end_time }}</p>
        <p class="meta">{{ s.location }}</p>
        <p class="spots">{{ s.spots_remaining }} spots remaining</p>
      </div>
      <div class="card-footer">
        <button *ngIf="!s.is_joined && s.spots_remaining > 0" (click)="join(s)" class="btn-primary">Join</button>
        <button *ngIf="s.is_joined" (click)="leave(s)" class="btn-secondary">Leave</button>
        <span *ngIf="!s.is_joined && s.spots_remaining === 0" class="full">Full</span>
      </div>
    </div>
  </div>
</div>
